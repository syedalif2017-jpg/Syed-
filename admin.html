<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Syed Admin - Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --admin-bg: #1e293b; --primary: #3b82f6; --success: #10b981; --warning: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; margin: 0; padding: 0; }
        
        #adminAuth { max-width: 420px; margin: 80px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); text-align: center; border-top: 6px solid var(--primary); }
        input { width: 100%; padding: 15px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn-login { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }

        #adminDashboard { display: none; }
        .top-header { background: var(--admin-bg); color: white; padding: 18px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 30px; max-width: 1300px; margin: auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-bottom: 4px solid var(--primary); }
        .stat-card h3 { margin: 0; color: #64748b; font-size: 14px; letter-spacing: 0.5px; }
        .stat-card .val { font-size: 32px; font-weight: 800; margin-top: 10px; color: #0f172a; }

        .table-box { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; background: #f8fafc; padding: 18px; border-bottom: 2px solid #e2e8f0; color: #475569; font-weight: 600; }
        td { padding: 18px; border-bottom: 1px solid #f1f5f9; font-size: 15px; color: #334155; }
        tr:hover { background-color: #f8fafc; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="adminAuth">
    <div style="background: #eff6ff; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
        <i class="fas fa-shield-alt" style="font-size: 40px; color: var(--primary);"></i>
    </div>
    <h2 style="margin:0; color: #1e293b;">Master Dashboard</h2>
    <p style="color: #64748b; margin-top: 8px;">Prashashak login karein</p>
    <input type="email" id="admEmail" placeholder="admin@example.com">
    <input type="password" id="admPass" placeholder="Password">
    <button class="btn-login" onclick="adminLogin()">Prashashak Login</button>
</div>

<div id="adminDashboard">
    <div class="top-header">
        <span><i class="fas fa-chart-line"></i> <b>SYED BUSINESS ADMIN</b></span>
        <button onclick="adminLogout()" style="background:#ef4444; border:none; color:white; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight: 600;"><i class="fas fa-power-off"></i> Logout</button>
    </div>

    <div class="container">
        <div id="errorBox" class="error-msg"></div>

        <div class="stats-grid">
            <div class="stat-card"><h3>TOTAL REVENUE</h3><div class="val" id="totalRev">₹ 0</div></div>
            <div class="stat-card" style="border-color:var(--success);"><h3>TOTAL ENTRIES</h3><div class="val" id="totalCount">0</div></div>
            <div class="stat-card" style="border-color:var(--warning);"><h3>AVG PER ENTRY</h3><div class="val" id="avgRev">₹ 0</div></div>
        </div>

        <div class="table-box">
            <h3 style="margin-top:0; margin-bottom: 20px; color: #1e293b;"><i class="fas fa-list-ul"></i> Transaction Logs</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User ID</th>
                        <th>Customer</th>
                        <th>Village</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="adminDataTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collectionGroup, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB7Wv6gS247nbC-eA1Ou1Df9ZY0dct0iLA", 
        authDomain: "syed-3abeb.firebaseapp.com", 
        projectId: "syed-3abeb" 
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // - Admin Access UID
    const ADMIN_UID = "DoIAhN0KRRatecApzXoIelZhuUq2"; 

    window.adminLogin = async () => {
        let e = document.getElementById("admEmail").value;
        let p = document.getElementById("admPass").value;
        if(!e || !p) { alert("Pura login detail dalein!"); return; }
        try {
            await signInWithEmailAndPassword(auth, e, p);
        } catch(err) { 
            alert("Login Failed: Email ya password galat hai."); 
        }
    };

    window.adminLogout = () => { signOut(auth).then(() => location.reload()); };

    onAuthStateChanged(auth, (user) => {
        if (user && user.uid === ADMIN_UID) {
            document.getElementById("adminAuth").style.display = "none";
            document.getElementById("adminDashboard").style.display = "block";
            fetchGlobalData();
        } else {
            document.getElementById("adminAuth").style.display = "block";
            document.getElementById("adminDashboard").style.display = "none";
        }
    });

    async function fetchGlobalData() {
        const table = document.getElementById("adminDataTable");
        const errorBox = document.getElementById("errorBox");
        table.innerHTML = "<tr><td colspan='5' style='text-align:center;'>🔄 Data fetch ho raha hai...</td></tr>";
        
        let revenue = 0; let count = 0;

        try {
            // Firestore query
            const snap = await getDocs(query(collectionGroup(db, 'customers'), orderBy("ts", "desc")));
            table.innerHTML = "";
            
            if(snap.empty) {
                table.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Abhi tak koi data nahi hai.</td></tr>";
                return;
            }

            snap.forEach(doc => {
                let d = doc.data();
                let cleanAmt = parseFloat(d.total.replace(/[^\d.-]/g, '')) || 0;
                revenue += cleanAmt;
                count++;
                
                table.innerHTML += `
                    <tr>
                        <td>${d.date || 'No Date'}</td>
                        <td><code style="background:#f1f5f9; padding:4px 8px; border-radius:5px;">${doc.ref.parent.parent.id.substring(0,6)}...</code></td>
                        <td><b>${d.name || 'Unknown'}</b></td>
                        <td>${d.village || '-'}</td>
                        <td style="color:var(--success); font-weight:bold;">${d.total}</td>
                    </tr>`;
            });

            document.getElementById("totalRev").innerText = "₹ " + revenue.toLocaleString('en-IN');
            document.getElementById("totalCount").innerText = count;
            document.getElementById("avgRev").innerText = "₹ " + (count > 0 ? (revenue / count).toFixed(2) : 0);
            errorBox.style.display = "none";

        } catch(e) { 
            console.error(e);
            table.innerHTML = "<tr><td colspan='5' style='text-align:center; color:red;'>Error: Data load nahi ho saka.</td></tr>";
            
            // Link provided for Index Creation if error occurs
            if(e.message.includes("index")) {
                errorBox.innerHTML = `<b>Index Setup Zaroori Hai:</b> Firebase Console mein jaakar is link par click karein aur index banayein: <br><a href="${e.message.split('at ')[1]}" target="_blank" style="color:blue;">Create Index in Firebase</a>`;
                errorBox.style.display = "block";
            }
        }
    }
</script>
</body>
</html>
