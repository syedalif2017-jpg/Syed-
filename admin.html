<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h2>📊 Admin Panel</h2>

<h3>Customers</h3>
<table border="1" id="c"></table>

<h3>Fuel</h3>
<table border="1" id="f"></table>

<h3>Expense</h3>
<table border="1" id="e"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collectionGroup, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7Wv6gS247nbC-eA1Ou1Df9ZY0dct0iLA",
  authDomain: "syed-3abeb.firebaseapp.com",
  projectId: "syed-3abeb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOAD DATA
load("customers","c");
load("fuel","f");
load("expense","e");

async function load(col,id){
  let snap = await getDocs(collectionGroup(db,col));
  let table = document.getElementById(id);

  snap.forEach(doc=>{
    let d = doc.data();
    table.innerHTML += `<tr><td>${JSON.stringify(d)}</td></tr>`;
  });
}

</script>

</body>
</html>
